# Overlays on top of vendor/rest_variantValidator/docker-compose.yml.
# Layered, not patched — upstream sources are not modified, this is
# pure configuration that compose merges at run time.
#
# Three purposes:
#   1. Redirect the upstream `seqdata` + `vv-logs` named volumes away from
#      ${HOME}/variantvalidator_data/ to ${DATA_DIR}/variantvalidator/...
#   2. Add bind-mounted volumes for the MySQL and PostgreSQL data dirs
#      (upstream has none, so the DBs live in the container writable
#      layer — every `docker compose down` would cost ~30 min of PG
#      initialization on the next `up`).
#   3. Suppress upstream's host port publishes. Upstream's compose is
#      written for standalone use and publishes ports for direct MySQL,
#      Postgres, and REST access (33061, 54321, 5001/5050/8000/9000). Our
#      gateway only ever talks to VV over the project's internal docker
#      network, so we don't need any of them on the host — and dropping
#      them avoids colliding with any other VV stack on the same host.
#      Compose concatenates `ports:` across override layers by default;
#      `!override []` replaces instead. Requires Compose v2.20+.
#
# Use:
#   docker compose -f docker-compose.yml \
#                  -f vendor/rest_variantValidator/docker-compose.yml \
#                  -f compose.vv-override.yml \
#                  up -d

services:
  # Upstream's `build:` directives use `context: .` and `dockerfile:
  # db_dockerfiles/...`. Compose v2 resolves those relative to the project
  # directory (the first `-f` file's dir = our repo root), not relative to
  # each compose file's own location, so the upstream paths can't be found.
  # We re-anchor every build context to the vendored tree explicitly.
  rv-vdb:
    build:
      context: ./vendor/rest_variantValidator
      dockerfile: db_dockerfiles/vdb/Dockerfile
    volumes:
      - vdb-data:/var/lib/mysql
    ports: !override []
    # Upstream's Dockerfile sets max_connections=250 in /etc/mysql/my.cnf.
    # VV's compute_pool_sizes() in rest_VariantValidator/utils/object_pool.py
    # scales its Validator/Formatter/g2t object pool to ~85% of MySQL's cap,
    # and each Validator's __init__ opens multiple MySQL connections during
    # construction (schema probe + data connection + vvhgvs/UTA setup), so
    # the boot peak runs at `pool * K` for some K > 1 — empirically we see
    # the connection count climb past 250 on a clean boot, never plateauing
    # at the pool object count. Lowering max_connections doesn't help: the
    # pool scales down by the same factor, hitting the new cap at the same
    # percentage. Only fix without modifying VV is to give MySQL enough
    # headroom to absorb the transient peak. 1000 covers K up to ~5 against
    # the RAM-limited pool ceiling of ~220 objects on this host.
    command: ["mysqld", "--max-connections=1000"]

  rv-vvta:
    build:
      context: ./vendor/rest_variantValidator
      dockerfile: db_dockerfiles/vvta/Dockerfile
    volumes:
      - vvta-data:/var/lib/postgresql/data
    ports: !override []

  rv-seqrepo:
    build:
      context: ./vendor/rest_variantValidator
      dockerfile: db_dockerfiles/seqrepo/Dockerfile

  rest-variantvalidator:
    build:
      context: ./vendor/rest_variantValidator
    ports: !override []
    # Upstream's docker-compose.yml overrides the image's CMD with
    # `/bin/bash -c "sleep infinity"` so a developer can docker-exec in and
    # start the REST service manually. We want it running automatically, so
    # restore the image's Dockerfile CMD (gunicorn).
    entrypoint: []
    command: ["gunicorn", "-b", "0.0.0.0:8000", "--timeout", "600", "app", "--threads=5", "--chdir", "./rest_VariantValidator/"]
    # Expose the upstream service under a friendlier alias so the gateway's
    # `VV_BASE_URL: http://variantvalidator:8000` resolves without us having
    # to bake upstream's service name into our config.
    networks:
      default:
        aliases:
          - variantvalidator

volumes:
  # Override upstream's named volumes: same name, deep-merged driver_opts.device.
  seqdata:
    driver_opts:
      device: ${DATA_DIR}/variantvalidator/seqdata

  vv-logs:
    driver_opts:
      device: ${DATA_DIR}/variantvalidator/logs

  # New bind-mounted volumes for the two databases.
  vdb-data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: ${DATA_DIR}/variantvalidator/vdb-mysql

  vvta-data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: ${DATA_DIR}/variantvalidator/vvta-postgres
