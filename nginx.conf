# nginx — TLS termination in front of the gateway.
#
# Expects three files under /etc/nginx/ssl (mounted read-only from outside via
# ${SSL_CERT_PATH} in .env):
#   cert.pem   — full server certificate chain (server cert + intermediates)
#   key.pem    — private key (no passphrase)
#   ca.pem     — trusted CA chain (optional; used when verifying upstreams)
#
# If your existing cert layout uses different filenames, symlink them in place
# rather than editing this file.

server {
    listen 9443 ssl http2;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 10 MB cap matches the 1000-variant request limit with plenty of headroom.
    client_max_body_size 10m;

    location / {
        proxy_set_header Host              $host:$server_port;
        proxy_set_header X-Forwarded-Host  $host:$server_port;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://gateway:8000;
        proxy_read_timeout 60s;
    }
}
