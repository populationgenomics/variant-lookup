# nginx — TLS termination + global in-flight cap for the main endpoint.
#
# Expects two files under /etc/nginx/ssl, bind-mounted individually from outside
# (see docker-compose.yml volumes + .env SSL_CERT_FILE / SSL_KEY_FILE):
#   cert.pem   — full server certificate chain (server cert + intermediates)
#   key.pem    — private key (no passphrase)

# Global in-flight cap for /v1/variant.
#
# Mutalyzer's per-call work serialises on its GIL (~1.6 s CPU per normalize),
# so unbounded concurrency would queue requests behind one another anyway with
# no throughput win. The cap exists to fail fast under sustained overload —
# clients see 429 with `Retry-After: 1` and back off, rather than blocking on
# an ever-growing internal queue. Passthroughs (/mutalyzer/*, /variantvalidator/*,
# /echtvar/frequencies) and unauthenticated probes (/healthz, /readyz) are
# unaffected.
#
# `$variant_endpoint_key` is hard-wired to a constant value via `map`, giving
# us a single global counter across all clients (rather than per-IP, which is
# what $binary_remote_addr would do). To raise the cap, change `limit_conn
# variant_endpoint 8;` below — no other lever.
map $request_uri $variant_endpoint_key {
    default "global";
}
limit_conn_zone $variant_endpoint_key zone=variant_endpoint:1m;
limit_conn_status 429;

server {
    listen 443 ssl;
    http2 on;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 1m;

    # Set Retry-After on 429s so clients can back off without guessing.
    error_page 429 = @too_many;
    location @too_many {
        add_header Retry-After 1 always;
        return 429 '{"detail":"too many concurrent requests; retry after 1s"}';
        default_type application/json;
    }

    location = /v1/variant {
        limit_conn variant_endpoint 8;
        proxy_set_header Host              $host:$server_port;
        proxy_set_header X-Forwarded-Host  $host:$server_port;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://gateway:8000;
        # Mutalyzer cold-cache requests take ~20 s; warm ones ~2-3 s. VV adds
        # ~1 s. 60 s gives plenty of headroom.
        proxy_read_timeout 60s;
    }

    location / {
        proxy_set_header Host              $host:$server_port;
        proxy_set_header X-Forwarded-Host  $host:$server_port;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://gateway:8000;
        proxy_read_timeout 60s;
    }
}
