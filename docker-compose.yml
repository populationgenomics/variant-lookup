# variant-lookup deployment.
#
# All deployment-specific values come from .env (copy .env.example, fill in).
#
# Services:
#   gateway       — our FastAPI service (MIT). Pure orchestrator: no
#                   variant-domain libraries in-process.
#   mutalyzer-api — sibling container running the MIT mutalyzer-api package
#                   (Mutalyzer 3 over HTTP). The gateway speaks to it the
#                   same way it speaks to VariantValidator. Cache files
#                   shared via the bind-mounted ${DATA_DIR}/mutalyzer/cache.
#   nginx         — TLS termination + cluster-wide in-flight rate limit on
#                   the main endpoint.
#
# The VariantValidator stack — built from upstream master, AGPL-3.0-only —
# is vendored under vendor/ by scripts/setup.sh and brought up alongside
# this compose stack:
#
#   ./scripts/setup.sh                  # one-time bootstrap
#   docker compose \
#     -f docker-compose.yml \
#     -f vendor/rest_variantValidator/docker-compose.yml \
#     -f compose.vv-override.yml \
#     up -d
#
# compose.vv-override.yml redirects VV's bind-mounts away from $HOME and
# adds persistent volumes for the MySQL + PostgreSQL data dirs. It's pure
# configuration layered over upstream — no patching.
#
# The separation keeps the AGPL boundary explicit: VariantValidator's
# upstream sources are checked out under vendor/ at master HEAD, built into
# their own images, and communicated with over HTTP only. They are not
# bundled into the gateway image. See ARCHITECTURE.md § "AGPL boundary".

services:
  gateway:
    image: variant-lookup-gateway:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ECHTVAR_VERSION: ${ECHTVAR_VERSION:-v0.2.4}
    environment:
      API_KEYS_FILE: /etc/variant-lookup/api-keys.yaml
      VV_BASE_URL: http://variantvalidator:8000
      MUTALYZER_BASE_URL: http://mutalyzer-api:5000
      ECHTVAR_BIN: echtvar
      ECHTVAR_ARCHIVES_DIR: /data/echtvar
      NCBI_EUTILS_EMAIL: ${NCBI_EUTILS_EMAIL}
      NCBI_EUTILS_API_KEY: ${NCBI_EUTILS_API_KEY:-}
      SERVICE_VERSION: ${SERVICE_VERSION:-0.1.0+dev}
      GNOMAD_VERSION: ${GNOMAD_VERSION:-4.1}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
    volumes:
      - ${DATA_DIR}/echtvar:/data/echtvar:ro
      - ${DATA_DIR}/refseq:/data/refseq:ro
      - ${API_KEYS_HOST_FILE}:/etc/variant-lookup/api-keys.yaml:ro
    depends_on:
      mutalyzer-api:
        condition: service_started
    restart: always
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"
      interval: 30s
      timeout: 5s
      retries: 3

  mutalyzer-api:
    image: variant-lookup-mutalyzer-api:latest
    build:
      context: docker/mutalyzer-api
      args:
        MUTALYZER_API_VERSION: ${MUTALYZER_API_VERSION:-0.3.2}
    environment:
      NCBI_EUTILS_EMAIL: ${NCBI_EUTILS_EMAIL}
      NCBI_EUTILS_API_KEY: ${NCBI_EUTILS_API_KEY:-}
      MUTALYZER_API_WORKERS: ${MUTALYZER_API_WORKERS:-4}
    volumes:
      - ${DATA_DIR}/mutalyzer/cache:/data/mutalyzer/cache
    restart: always

  nginx:
    image: nginx:1.29-alpine
    ports:
      - "${NGINX_PORT:-9443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount the two TLS files individually at the names nginx.conf expects,
      # so the host filenames can be anything. The bind mount preserves host
      # UIDs/perms; nginx's master process runs as root inside the container,
      # so root-only key files on the host are readable without copying.
      - ${SSL_CERT_FILE}:/etc/nginx/ssl/cert.pem:ro
      - ${SSL_KEY_FILE}:/etc/nginx/ssl/key.pem:ro
    depends_on:
      gateway:
        condition: service_started
    restart: always
